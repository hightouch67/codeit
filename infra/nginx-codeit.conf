# =========================
# HTTP → HTTPS redirect (all codeit subdomains)
# =========================
server {
    listen 80;
    server_name codeit.brickvue.com *.codeit.brickvue.com api.codeit.brickvue.com;
    return 301 https://$host$request_uri;
}

# =========================
# CodeIt — Main app (dashboard) → 8082
# =========================
server {
    listen 443 ssl http2;
    server_name codeit.brickvue.com;

    ssl_certificate /etc/letsencrypt/live/brickvue.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brickvue.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8082;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# =========================
# CodeIt — Per-user Expo apps (*.codeit.brickvue.com → user proxy 8081)
# The user-proxy reads the subdomain from Host header and routes
# to the correct per-user Expo port (9000-18999)
# =========================
server {
    listen 443 ssl http2;
    server_name ~^(?<username>[a-z0-9-]+)\.codeit\.brickvue\.com$;

    ssl_certificate /etc/letsencrypt/live/brickvue.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brickvue.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:8081;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}

# =========================
# CodeIt — Backend API + WebSocket → 3001
# =========================
server {
    listen 443 ssl http2;
    server_name api.codeit.brickvue.com;

    ssl_certificate /etc/letsencrypt/live/brickvue.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/brickvue.com/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam /etc/letsencrypt/ssl-dhparams.pem;

    location / {
        proxy_pass http://localhost:3001;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }
}
