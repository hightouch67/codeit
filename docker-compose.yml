version: "3.8"

services:
  server:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeit-server
    ports:
      - "3001:3001"
    environment:
      - PORT=3001
      - NODE_ENV=production
      - AI_BASE_URL=${AI_BASE_URL:-http://host.docker.internal:11434}
      - AI_MODEL=${AI_MODEL:-qwen3.5}
      - AI_API_KEY=${AI_API_KEY:-}
      - GITHUB_TOKEN=${GITHUB_TOKEN:-}
      - GITHUB_ORG=${GITHUB_ORG:-}
      - GIT_REPOS_DIR=/data/repos
      - BOILERPLATE_DIR=/app/boilerplate
      - DOCKER_ENABLED=false
      - MAX_RETRIES=2
      - DB_HOST=${DB_HOST:-localhost}
      - DB_PORT=${DB_PORT:-3306}
      - DB_USER=${DB_USER:-codeit}
      - DB_PASSWORD=${DB_PASSWORD:-}
      - DB_NAME=${DB_NAME:-codeit}
      - JWT_SECRET=${JWT_SECRET:-changeme}
      - CODEIT_DOMAIN=${CODEIT_DOMAIN:-codeit.example.com}
    volumes:
      - codeit-repos:/data/repos
      - ./boilerplate:/app/boilerplate:ro
    restart: unless-stopped
    networks:
      - codeit-network

  proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: codeit-proxy
    ports:
      - "8081:8081"
    environment:
      - PROXY_PORT=8081
      - CODEIT_DOMAIN=${CODEIT_DOMAIN:-codeit.brickvue.com}
    command: node /app/infra/user-proxy.js
    restart: unless-stopped
    networks:
      - codeit-network

volumes:
  codeit-repos:

networks:
  codeit-network:
    driver: bridge
